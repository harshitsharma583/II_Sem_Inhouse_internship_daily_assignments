<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-image: linear-gradient(rgba(11, 44, 77, 0.75), rgba(11, 44, 77, 0.75)), url("background 5.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 350px;
            background-color: white;
            padding: 25px;
            border: 2px solid navy;
            border-radius: 10px;
            box-shadow: 0 6px 20px black;
        }

        .login-box img {
            display: block;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 10px;
        }

        h1 {
            text-align: center;
            color: navy;
            font-size: 28px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid gray;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 11px;
            background-color: navy;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #164d80;
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 14px;
        }

        .links a {
            color: navy;
            font-size: 14px;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="skit logo.jpg" alt="SKIT logo">
        <h1>Student Login</h1>

        <form>
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="form.html">New Admission</a>
            <a href="index.html">Back Home</a>
        </div>
    </div>
    
</body>
</html>
