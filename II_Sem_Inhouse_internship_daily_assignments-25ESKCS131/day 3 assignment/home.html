<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Successful</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("background 5.jpg");
    background-size:cover;
}

.container{
    width:450px;
    background:white;
    padding:35px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:15px;
}

.tick{
    font-size:70px;
    color:green;
}

h1{
    color:#2c3e50;
    margin:15px 0;
}

p{
    color:#555;
    margin-bottom:25px;
    font-size:18px;
}

button{
    background:#3498db;
    color:white;
    border:none;
    padding:12px 30px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}
</style>

</head>
<body>

<div class="container">

    <img src="skit logo.jpg" class="logo" alt="SKIT Logo">

    <div class="tick">✔</div>

    <h1>Admission Successful!</h1>

    <p>
        Congratulations! 🎉<br><br>
        Your admission form has been submitted successfully.
        <br>
        Our admission team will contact you soon.
    </p>

    <button onclick="goHome()">🏠 Home</button>

</div>
</body>
</body>
</html>
